name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: zulu

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        run: dotnet restore

      # SonarCloud coverage.exclusions (#243 Phase 1) — reserved for genuinely
      # untestable code: bootstrap/DI, EF/generated, options POCOs, external-SDK
      # glue, and hosted BackgroundServices. One line per entry:
      #   Program.cs                                   app-entry builder chain, no branching.
      #   Extensions/ServiceCollectionExtensions*.cs   DI registration (all 4 partials; glob widened from the exact name that matched only 1).
      #   Extensions/WebApplicationExtensions.cs       middleware-pipeline wiring.
      #   Middleware/**                                ASP.NET pipeline glue (correlation, security headers, exception handlers). NOTE: MinimumVersionMiddleware holds a pure semver comparator — Phase 2 extracts it to a testable layer (Orbit.Api has no test project yet) and covers it.
      #   OpenApi/**                                   Swagger IOpenApiDocumentTransformer.
      #   OAuth/**                                     OAuth login-page HTML builder + authorization-state store.
      #   Persistence/OrbitDbContext.cs                EF model configuration.
      #   Persistence/OrbitDbContextFactory.cs         design-time EF factory.
      #   Persistence/GenericRepository.cs             thin EF CRUD wrapper.
      #   Persistence/UnitOfWork.cs                    EF SaveChanges wrapper.
      #   Persistence/AccountResetRepository.cs        raw EF/SQL data access.
      #   Configuration/**                             options POCOs (Ai/Jwt/Google/... settings).
      #   Services/ReminderSchedulerService.cs         hosted ScheduledService (pure reminder-text helpers are a Phase-2 extract target).
      #   Services/SlipAlertSchedulerService.cs        hosted ScheduledService.
      #   Services/GoalDeadlineNotificationService.cs  hosted ScheduledService.
      #   Services/HabitDueDateAdvancementService.cs   hosted BackgroundService.
      #   Services/DataEncryptionMigrationService.cs   one-time hosted BackgroundService.
      #   Services/AccountDeletionService.cs           hosted BackgroundService.
      #   Services/PushNotificationService.cs          FirebaseAdmin + WebPush SDK glue.
      #   Services/GoogleTokenService.cs               Google OAuth token HTTP client (token-outcome classification is a Phase-2 extract target).
      #   Services/BackgroundServiceHealthCheck.cs     IHealthCheck over a static registry.
      #   Services/StripeCouponRewardService.cs        Stripe SDK coupon/subscription wrapper.
      #   Services/GeoLocationService.cs               ipapi.co HTTP lookup (IsPrivateIpAddress classifier is a Phase-2 extract target).
      #   AI/AiCompletionClient.cs                     OpenAI SDK wrapper.
      #   AI/AiBatchClient.cs                          OpenAI Files/Batch SDK wrapper (sibling of AiCompletionClient; pre-release OPENAI001 surface, no mockable seam).
      #   AI/AudioTranscriptionService.cs              OpenAI Audio SDK wrapper (constructs AudioClient in-ctor from settings, no seam).
      #   Services/StripeBillingService.cs             Stripe SDK wrapper (checkout/portal/subscription/invoice/coupon), sibling of StripeCouponRewardService.
      #   Services/GooglePlayBillingService.cs         Google Android Publisher SDK glue (Play subscription verify/acknowledge).
      #   Services/Calendar/**                         Google Calendar v3 SDK glue + its DI extension; the testable filtering/dedup/mapping lives in GoogleCalendarEventFetcher (in coverage).
      #   BackgroundJobs/HangfireRecurringJobRegistrar.cs  Hangfire recurring-job registration IHostedService (pure AddOrUpdate wiring).
      #   Orbit.Analyzers/**                           build-time Roslyn analyzers (netstandard2.0; Orbit.Analyzers.Tests runs outside the runtime coverage set).
      #   Orbit.Analyzers.CodeFixes/**                 build-time Roslyn code-fix providers (netstandard2.0; sibling of Orbit.Analyzers, outside the runtime coverage set).
      #   .github/**                                   CI tooling scripts (e.g. scripts/check_coverage.py) — not shipped product code (parity with load-tests/**).
      # DROPPED (now in coverage): Services/AppConfigService.cs (pure ConvertValue<T> + injectable cache/repo — now covered by AppConfigServiceTests) and
      # Services/UserDateService.cs (user-timezone "today" + week-start, injectable deps) — both live in
      # Orbit.Infrastructure, which is in the coverage run, so they are unit-testable and should count.
      # sonar.exclusions additions — non-product / false-positive sources:
      #   Email/Templates/**  HTML-email templates. Web:S1827/S6819/S5257 (drop cellspacing, use <img> not role=presentation, replace layout tables with CSS) are false positives for email: table layout + cellspacing/cellpadding + role="presentation" are the required cross-client techniques (Outlook/legacy clients lack CSS layout support). Static assets with no maintainability value.
      #   load-tests/**       k6 load-test scenario scripts — developer tooling, not shipped product code (parity with **/.claude/**).
      # SonarCloud cpd.exclusions (#243 "Duplicated code → 0") — reserved for IRREDUCIBLE structural
      # mirrors where the shared logic is already extracted and what remains cannot be de-duped
      # without hurting readability. One line per entry:
      #   Chat/Tools/Implementations/CreateHabitTool.cs   } declarative LLM-facing JSON parameter schemas: create/update mirror
      #   Chat/Tools/Implementations/UpdateHabitTool.cs   } overlapping habit fields but with per-tool field sets AND per-tool descriptions,
      #                                                     embedded in a single anonymous object that cannot be composed from shared
      #                                                     fragments without leaving CPD-flagged mirror call sites or degrading readability.
      #   Services/AgentCatalogService.UserDataCatalog.cs declarative user-data catalog: each UserDataFieldDescriptor row is unique data
      #                                                     but shares a constructor shape CPD flags (parity with the file's S107/S1192/CA1861 suppressions).
      #   Services/SlipAlertSchedulerService.cs           } sibling scheduled services already share ScheduledServiceBase; the residual
      #   Services/ProactiveCheckinSchedulerService.cs    } duplication is per-class [LoggerMessage] source-generator partial-method boilerplate
      #                                                     (Started/Stopped/Error), which the compiler requires to live in each class.
      #   Accountability/Commands/AcceptAccountabilityPairCommand.cs } the shared level-sync tail is extracted to
      #   Social/Commands/AcceptFriendRequestCommand.cs             } LevelDefinitions.SyncLevel; the residual is the
      #                                                     BuildRequesterNotification parallel mirror — a null-guard + isPortuguese ternary skeleton
      #                                                     emitting DISTINCT localized copy for two independent accept events in separate bounded
      #                                                     contexts (accountability invite vs friend request). CPD normalizes the differing string
      #                                                     literals so the skeletons match; a shared builder would couple the two contexts and leave
      #                                                     CPD-flagged per-event title/body ternaries at each call site without improving readability.
      - name: SonarScanner Begin
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"thomasluizon_orbit-api" \
            /o:"thomasluizon" \
            /d:sonar.token="${SONAR_TOKEN}" \
            /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" \
            /d:sonar.exclusions="**/Migrations/**,**/bin/**,**/obj/**,**/OAuth/OAuthLoginPage.cs,**/.claude/**,**/Email/Templates/**,**/load-tests/**" \
            /d:sonar.cpd.exclusions="**/Chat/Tools/Implementations/CreateHabitTool.cs,**/Chat/Tools/Implementations/UpdateHabitTool.cs,**/Services/AgentCatalogService.UserDataCatalog.cs,**/Services/SlipAlertSchedulerService.cs,**/Services/ProactiveCheckinSchedulerService.cs,**/Accountability/Commands/AcceptAccountabilityPairCommand.cs,**/Social/Commands/AcceptFriendRequestCommand.cs" \
            /d:sonar.coverage.exclusions="**/Program.cs,**/Extensions/ServiceCollectionExtensions*.cs,**/Extensions/WebApplicationExtensions.cs,**/Middleware/**,**/OpenApi/**,**/OAuth/**,**/Persistence/OrbitDbContext.cs,**/Persistence/OrbitDbContextFactory.cs,**/Persistence/GenericRepository.cs,**/Persistence/UnitOfWork.cs,**/Persistence/AccountResetRepository.cs,**/Configuration/**,**/Services/ReminderSchedulerService.cs,**/Services/SlipAlertSchedulerService.cs,**/Services/GoalDeadlineNotificationService.cs,**/Services/HabitDueDateAdvancementService.cs,**/Services/DataEncryptionMigrationService.cs,**/Services/PushNotificationService.cs,**/Services/AccountDeletionService.cs,**/Services/GoogleTokenService.cs,**/Services/BackgroundServiceHealthCheck.cs,**/Services/StripeCouponRewardService.cs,**/Services/StripeBillingService.cs,**/Services/GooglePlayBillingService.cs,**/Services/Calendar/**,**/AI/AiCompletionClient.cs,**/AI/AiBatchClient.cs,**/AI/AudioTranscriptionService.cs,**/Services/GeoLocationService.cs,**/BackgroundJobs/HangfireRecurringJobRegistrar.cs,**/Orbit.Analyzers/**,**/Orbit.Analyzers.CodeFixes/**,**/.github/**"

      - name: Build
        run: dotnet build --no-restore

      - name: Test with Coverage
        run: |
          dotnet test tests/Orbit.Domain.Tests --no-build --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          dotnet test tests/Orbit.Application.Tests --no-build --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          dotnet test tests/Orbit.Infrastructure.Tests --no-build --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: SonarScanner End
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${SONAR_TOKEN}"
