name: API Tests

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Fail if committed openapi.json is stale
        run: |
          if ! git diff --exit-code -- src/Orbit.Api/openapi.json; then
            echo "::error::openapi.json is stale. Run 'dotnet build src/Orbit.Api' and commit src/Orbit.Api/openapi.json."
            exit 1
          fi
          echo "OK: committed openapi.json matches the build output."

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Run Domain Tests
        run: dotnet test tests/Orbit.Domain.Tests --no-restore --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory ./TestResults

      - name: Run Application Tests
        run: dotnet test tests/Orbit.Application.Tests --no-restore --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory ./TestResults

      - name: Run Infrastructure Tests
        run: dotnet test tests/Orbit.Infrastructure.Tests --no-restore --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory ./TestResults

      - name: Enforce line-coverage threshold
        run: python3 .github/scripts/check_coverage.py ./TestResults 70

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Fail on vulnerable production packages
        run: |
          report=$(dotnet list src/Orbit.Api/Orbit.Api.csproj package --vulnerable --include-transitive)
          echo "$report"
          if echo "$report" | grep -qE 'has the following vulnerable packages'; then
            echo "::error::Vulnerable NuGet package detected in production dependencies"
            exit 1
          fi

      - name: Report vulnerable test/dev packages (non-blocking)
        if: always()
        run: dotnet list package --vulnerable --include-transitive || true

  migration-guard:
    name: Guard Migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fail on edits to applied migrations
        run: |
          git fetch origin "${{ github.base_ref }}"
          violations=$(git diff --name-status --diff-filter=MDR "origin/${{ github.base_ref }}...HEAD" -- ':(glob)**/Migrations/**' ':(glob,exclude)**/*ModelSnapshot.cs')
          if [ -n "$violations" ]; then
            echo "::error::An already-applied EF migration was modified, deleted, or renamed. Migrations are append-only: add a NEW migration instead of editing an existing one (the ModelSnapshot is the only file EF regenerates)."
            echo "$violations"
            exit 1
          fi
          echo "OK: no existing migration was edited (new migrations are allowed)."

  convention-guard:
    name: Guard Conventions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Ban permissive CORS
        run: |
          violations=$(grep -rnE '\.AllowAnyHeader\(|\.AllowAnyMethod\(' src --include='*.cs' || true)
          if [ -n "$violations" ]; then
            echo "::error::CORS must enumerate explicit headers and methods. AllowAnyHeader()/AllowAnyMethod() are banned."
            echo "$violations"
            exit 1
          fi
          echo "OK: no permissive CORS calls."

      - name: Stripe key set only at startup
        run: |
          violations=$(grep -rnE 'StripeConfiguration\.ApiKey[[:space:]]*=' src --include='*.cs' | grep -v 'ServiceCollectionExtensions.Infrastructure.cs' || true)
          if [ -n "$violations" ]; then
            echo "::error::StripeConfiguration.ApiKey may only be assigned once at startup in ServiceCollectionExtensions.Infrastructure.cs. Never set it per-request."
            echo "$violations"
            exit 1
          fi
          echo "OK: StripeConfiguration.ApiKey assigned only at startup."

      - name: Ban TODO/FIXME/HACK markers
        run: |
          violations=$(grep -rnE '\b(TODO|FIXME|HACK)\b' src --include='*.cs' | grep -v '/Migrations/' || true)
          if [ -n "$violations" ]; then
            echo "::error::TODO/FIXME/HACK markers are banned in committed source. Resolve the work or track it in a GitHub issue."
            echo "$violations"
            exit 1
          fi
          echo "OK: no TODO/FIXME/HACK markers in source."

  openapi-breaking:
    name: OpenAPI Breaking-Change Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}"

      - name: Check base spec exists
        id: base-spec
        run: |
          if git cat-file -e "origin/${{ github.base_ref }}:src/Orbit.Api/openapi.json" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No openapi.json on origin/${{ github.base_ref }} yet; skipping breaking-change diff (first-PR bootstrap)."
          fi

      - name: Detect breaking API changes
        if: steps.base-spec.outputs.exists == 'true'
        uses: oasdiff/oasdiff-action/breaking@v0
        with:
          base: "origin/${{ github.base_ref }}:src/Orbit.Api/openapi.json"
          revision: "src/Orbit.Api/openapi.json"
          fail-on: ERR
          review: false
