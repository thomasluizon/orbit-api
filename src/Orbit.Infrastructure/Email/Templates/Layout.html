<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="supported-color-schemes" content="dark">
    <title>Orbit</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&family=Inter:wght@600;700&display=swap');
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #020618;">
    <div style="display: none; max-height: 0; overflow: hidden; mso-hide: all;">{{preheader}}&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;</div>
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #020618;">
        <tr>
            <td align="center" bgcolor="{{headerBgColor}}" style="{{headerBackground}}">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 600px;">
                    <tr>
                        <td align="center" style="padding: 44px 24px 28px;">
                            <img src="{{logoUrl}}" width="56" height="56" alt="Orbit" style="display: block; border: 0; font-family: Inter, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 700; color: #F8FAFC; letter-spacing: -0.5px;">
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
        <tr>
            <td align="center" style="padding: 0 20px;">
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 600px;">
                    <tr>
                        <td bgcolor="#111526" style="background-color: #111526; border: 1px solid #282C3B; border-radius: 20px; padding: 40px 32px;">
{{content}}
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding: 32px 24px 48px;">
                            <p style="margin: 0; font-family: Roboto, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 12px; letter-spacing: 0.2px; color: #90A1B9;">{{footer}}</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
