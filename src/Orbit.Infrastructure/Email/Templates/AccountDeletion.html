<h1 style="margin: 0 0 8px; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 600; line-height: 1.3; color: #FB2C36; text-align: center;">{{heading}}</h1>
<p style="margin: 0 0 16px; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.55; color: #CAD5E2; text-align: center;">{{intro}}</p>
<p style="margin: 0 0 16px; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; color: #F8FAFC; text-align: center;">{{codeLabel}}</p>
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
    <tr>
        <td align="center" bgcolor="#241727" style="background-color: #241727; border-radius: 14px; padding: 22px 16px;">
            <span style="font-family: Roboto, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 32px; font-weight: 500; letter-spacing: 8px; color: #FB2C36; white-space: nowrap;">{{code}}</span>
        </td>
    </tr>
</table>
<p style="margin: 24px 0 0; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; line-height: 1.55; color: #90A1B9; text-align: center;">{{warning}}</p>
