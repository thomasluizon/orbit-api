<h1 style="margin: 0 0 20px; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 600; line-height: 1.3; color: #7F46F7;">Support Request</h1>
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
    <tr>
        <td style="padding: 0 0 2px; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #90A1B9;">From</td>
    </tr>
    <tr>
        <td style="padding: 0 0 14px; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; color: #F8FAFC;">{{fromName}} &lt;{{fromEmail}}&gt;</td>
    </tr>
    <tr>
        <td style="padding: 0 0 2px; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #90A1B9;">Subject</td>
    </tr>
    <tr>
        <td style="padding: 0 0 18px; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; color: #F8FAFC;">{{subject}}</td>
    </tr>
    <tr>
        <td height="1" bgcolor="#282C3B" style="height: 1px; line-height: 1px; font-size: 1px;">&nbsp;</td>
    </tr>
    <tr>
        <td style="padding: 18px 0 0; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.55; color: #CAD5E2;">{{message}}</td>
    </tr>
</table>
