<h1 style="margin: 0 0 8px; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 600; line-height: 1.3; color: #F8FAFC; text-align: center;">{{heading}}</h1>
<p style="margin: 0 0 28px; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.55; color: #CAD5E2; text-align: center;">{{intro}}</p>
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
    <tr>
        <td align="center" style="padding: 4px 0 24px;">
            <a href="{{confirmUrl}}" style="display: inline-block; background-color: #7F46F7; color: #FFFFFF; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 500; text-decoration: none; padding: 15px 40px; border-radius: 999px; box-shadow: 0 8px 28px rgba(127, 70, 247, 0.45);">{{cta}}</a>
        </td>
    </tr>
</table>
<p style="margin: 0; font-family: Rubik, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 13px; line-height: 1.55; color: #90A1B9; text-align: center;">{{warning}}</p>
